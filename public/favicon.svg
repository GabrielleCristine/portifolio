<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7" fill="#f3b3a5"/>

  <!-- Dice face (white rounded square) -->
  <rect x="5" y="5" width="22" height="22" rx="4" ry="4" fill="white" opacity="0.95"/>

  <!-- Dots for face showing 5 (classic dice arrangement) -->
  <!-- Top-left -->
  <circle cx="10.5" cy="10.5" r="2.2" fill="#f3b3a5"/>
  <!-- Top-right -->
  <circle cx="21.5" cy="10.5" r="2.2" fill="#f3b3a5"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="2.2" fill="#f3b3a5"/>
  <!-- Bottom-left -->
  <circle cx="10.5" cy="21.5" r="2.2" fill="#f3b3a5"/>
  <!-- Bottom-right -->
  <circle cx="21.5" cy="21.5" r="2.2" fill="#f3b3a5"/>
</svg>
